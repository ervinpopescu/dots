# markdownlint configuration
# https://github.com/DavidAnson/markdownlint/blob/main/doc/Rules.md
default: true

# Disable rules handled by prettier or too opinionated for this repo
MD013: false # line-length — prettier handles wrapping
MD033: false # no-inline-html — used in README
MD041: false # first-line-heading — not all docs start with a heading
MD024: false # no-duplicate-heading — sibling sections may share names
